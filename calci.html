<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> NumBase Converter </title>
    <link rel="icon" href="Calci.png">
    <link rel="stylesheet" href="calci.css">
</head>
<body>
    <div class="calculator">
        <h1>Number System Converter <br> Calculator by Akhilaa  </h1> 
        <h5 align="center"> Binary ↔ Decimal ↔ Hexadecimal ↔ Octal  </h5>
        <p id="error-msg" style="color:red; font-size:14px; text-align:center;"></p>
        <br>
        <br>
        <div class="input-group">
            <label for="decimal">Decimal</label>
            <input type="text" id="decimal" placeholder="Enter Any Decimal Number">
        </div>
        <div class="input-group">
            <label for="binary">Binary</label>
            <input type="text" id="binary" placeholder="Enter Any Binary Number">
        </div>
        <div class="input-group">
            <label for="octal">Octal</label>
            <input type="text" id="octal" placeholder="Enter Any Octal Number">
        </div>
        <div class="input-group">
            <label for="hexadecimal">Hexadecimal</label>
            <input type="text" id="hexadecimal" placeholder="Enter Any Hexadecimal Number">
        </div>
    </div>
    <script src="calci.js"></script>
</body>
</html>
